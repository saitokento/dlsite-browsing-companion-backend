openapi: "3.0.1"
info:
  title: "streaming-lambda-api"
  version: "1.0.0"
paths:
  /ask:
    post:
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/WorkRequest"
                # - $ref: "#/components/schemas/OtherRequest"
              discriminator:
                propertyName: usecase
                mapping:
                  work: "#/components/schemas/WorkRequest"
                  # other: "#/components/schemas/OtherRequest" 
      responses:
        "200":
          description: "Streaming response from agent"
          content:
            text/plain:
              schema:
                type: string
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2021-11-15/functions/${StreamingResponseFunction.Arn}/response-streaming-invocations"
        httpMethod: "POST"
        responseTransferMode: "STREAM"
        type: "aws_proxy"
      security:
        - api_key: []
    options:
      responses:
        200:
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
          content: {}
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "never"
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      security: []
components:
  schemas:
    WorkRequest:
      type: object
      properties:
        characterId:
          type: string
          enum: [default]
        usecase:
          type: string
          enum: [work]
        payload:
          $ref: "#/components/schemas/WorkPayload"
      required:
        - characterId
        - usecase
        - payload
    # OtherRequest:
    #   type: object
    #   properties:
    #     characterId:
    #       type: string
    #       enum: [default]
    #     usecase:
    #       type: string
    #       enum: [other]
    #     payload:
    #       $ref: "#/components/schemas/OtherPayload"
    #   required:
    #     - characterId
    #     - usecase
    #     - payload
    WorkPayload:
      type: object
      properties:
        work:
          $ref: "#/components/schemas/Work"
      required:
        - work
    # OtherPayload:
    #   type: object
    #   properties:
    #     other_property:
    #       $ref: "#/components/schemas/OtherProperty"
    #   required:
    #     - other_property
    Work:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        officialPrice:
          type: number
        couponPrice:
          type: number
          nullable: true
        pricePrefix:
          type: string
        priceSuffix:
          type: string
        genres:
          type: array
          items:
            type: string
        description:
          type: string
      required:
        - name
        - price
        - officialPrice
        - pricePrefix
        - priceSuffix
        - genres
        - description
  # OtherProperty:
  #     type: object
  #     properties:
  #       ...
  #     required:
  #       ...
x-amazon-apigateway-api-key-source: HEADER
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: x-api-key
      in: header
